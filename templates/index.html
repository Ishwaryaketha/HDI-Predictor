<!DOCTYPE html>
<html>
<head>
    <title>HDI Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="navbar">
    <a href="/">Home</a>
    <a href="/analysis">Analysis</a>
    <a href="/about">About</a>
</div>
<div class="container">
    <h1>Human Development Index (HDI) Predictor</h1>

<p>
Predict a country's Human Development Index using Machine Learning.
Enter the required indicators below to estimate the HDI score and development category.
</p>
    <form action="/predict" method="POST">

        <input type="number" step="any" name="life" placeholder="Life Expectancy at Birth" required>

        <input type="number" step="any" name="expected" placeholder="Expected Years of Education" required>

        <input type="number" step="any" name="mean" placeholder="Mean Years of Education" required>

        <input type="number" step="any" name="gni" placeholder="GNI Per Capita" required>

        <button type="submit">Predict</button>
        <br><br>

        <a href="/analysis">
            <button type="button">View Data Analysis</button>
        </a>

    </form>

</div>
<footer>
<p>HDI Predictor | Machine Learning Internship Project | 2026</p>
</footer>
</body>
</html>
